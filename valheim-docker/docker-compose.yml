services:
  valheim:
    # Published image: ghcr.io/mekbits/games/valheim-server:latest
    image: valheim-server:local
    build: .
    platform: linux/amd64
    container_name: valheim
    restart: unless-stopped
    stop_grace_period: 90s
    security_opt:
      - no-new-privileges:true

    ports:
      - "${SERVER_PORT:-2456}:${SERVER_PORT:-2456}/udp"                 # game
      - "${SERVER_QUERY_PORT:-2457}:${SERVER_QUERY_PORT:-2457}/udp"     # Steam query (game port + 1)

    environment:
      # --- Update behaviour ---
      UPDATE_ON_START: "${UPDATE_ON_START:-false}"        # set true to validate/update on each start

      # --- Server identity ---
      SERVER_NAME:     "${SERVER_NAME:-My Valheim Server}"
      WORLD_NAME:      "${WORLD_NAME:-Dedicated}"
      SERVER_PASSWORD: "${SERVER_PASSWORD-change-me}"      # min 5 chars; required for public servers
      SERVER_PUBLIC:   "${SERVER_PUBLIC:-true}"            # list on the community server browser

      # --- Networking (must match the ports: mapping above) ---
      SERVER_PORT:       "${SERVER_PORT:-2456}"
      SERVER_QUERY_PORT: "${SERVER_QUERY_PORT:-2457}"      # must be SERVER_PORT+1

      # --- Crossplay (PlayFab/Xbox + Steam) ---
      CROSSPLAY: "${CROSSPLAY:-false}"

      # --- Access control (optional; when set, OVERWRITES the on-disk list) ---
      # Comma/space separated SteamID64s.
      ADMIN_IDS:     "${ADMIN_IDS:-}"
      BANNED_IDS:    "${BANNED_IDS:-}"
      PERMITTED_IDS: "${PERMITTED_IDS:-}"

      # --- Mods (opt-in) ---
      BEPINEX:              "${BEPINEX:-false}"            # true = install BepInEx mod loader
      BEPINEX_DOWNLOAD_URL: "${BEPINEX_DOWNLOAD_URL:-}"

      # --- Advanced launch flags (optional passthrough) ---
      EXTRA_ARGS: "${EXTRA_ARGS:-}"

      # --- Backups ---
      BACKUP_ENABLED:  "${BACKUP_ENABLED:-true}"
      BACKUP_INTERVAL: "${BACKUP_INTERVAL:-3600}"          # seconds
      BACKUP_KEEP:     "${BACKUP_KEEP:-24}"

      # --- Notifications ---
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"

    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3

    volumes:
      - valheim-install:/home/steam/valheim
      - valheim-data:/home/steam/valheim-data

volumes:
  valheim-install:
  valheim-data:
